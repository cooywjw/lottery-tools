<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 1280px;
    height: 720px;
    margin: 0;
    background: linear-gradient(180deg, #1a1a2e 0%, #0a0a1a 100%);
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;

  }

    border-radius: 12px;
    overflow: hidden;
  }
  th {
    background: #e94560;

    padding: 14px 20px;

  td {

    padding: 12px 20px;

  .note {

    font-size: 16px;

</head>
<body>

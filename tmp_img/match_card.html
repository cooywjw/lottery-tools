<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛事卡片</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --gold: #d4a84b;
    --gold-dim: #8a6830;
    --text: #f0ece0;
    --muted: #6b6570;
    --accent-red: #c0392b;
    --accent-green: #27ae60;
    --border: rgba(212, 168, 75, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    padding: 20px;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(212, 168, 75, 0.03) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(192, 57, 43, 0.04) 0%, transparent 50%);
  }

  /* --- Card Container --- */
  .match-card {
    position: relative;
    width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .match-card:hover {
    transform: translateY(-6px) scale(1.015);
  }

  /* Top accent bar */
  .match-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-dim));
  }

  /* Noise overlay */
  .match-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.6;
  }

  /* --- Header --- */
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 22px 12px;
    position: relative;
  }

  .league-badge {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .league-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 6px var(--gold);
  }

  .league-name {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 700;
  }

  .match-time {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .date-label {
    font-size: 9px;
    color: var(--muted);
    opacity: 0.6;
    text-align: right;
    margin-top: 2px;
  }

  /* --- Divider --- */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 0 22px;
  }

  /* --- Teams Section --- */
  .teams {
    display: flex;
    align-items: center;
    padding: 28px 22px;
    gap: 0;
    position: relative;
  }

  .team {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: transform 0.3s ease;
  }

  .match-card:hover .team.home { transform: translateX(-4px); }
  .match-card:hover .team.away { transform: translateX(4px); }

  .team-crest {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    position: relative;
    overflow: hidden;
  }

  .team-crest::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), transparent 70%);
  }

  .team-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    letter-spacing: 0.02em;
    line-height: 1.3;
  }

  .team-name-en {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
  }

  /* VS divider */
  .vs-divider {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 0 16px;
    position: relative;
  }

  .vs-line {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  .vs-text {
    font-size: 11px;
    color: var(--gold-dim);
    font-weight: 700;
    letter-spacing: 0.15em;
  }

  /* --- Score Section --- */
  .score-row {
    display: flex;
    justify-content: center;
    align-items: baseline;
    gap: 12px;
    padding: 0 22px 24px;
  }

  .score {
    font-family: 'Noto Serif SC', serif;
    font-size: 44px;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .score-sep {
    font-size: 22px;
    color: var(--gold-dim);
    font-weight: 400;
  }

  /* --- Prediction Footer --- */
  .card-footer {
    padding: 14px 22px;
    background: rgba(0,0,0,0.3);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--border);
    position: relative;
  }

  .prediction {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .pred-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
  }

  .pred-tags {
    display: flex;
    gap: 6px;
  }

  .pred-tag {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .pred-tag.hot {
    background: rgba(192, 57, 43, 0.2);
    color: #e74c3c;
    border: 1px solid rgba(192, 57, 43, 0.35);
  }

  .pred-tag.safe {
    background: rgba(39, 174, 96, 0.15);
    color: #2ecc71;
    border: 1px solid rgba(39, 174, 96, 0.3);
  }

  .odd-value {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .odd-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
  }

  .odd-number {
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    font-family: 'Space Mono', monospace;
  }

  /* --- Entry animation --- */
  @keyframes cardIn {
    from {
      opacity: 0;
      transform: translateY(24px) scale(0.97);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .match-card {
    animation: cardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .card-header { animation: cardIn 0.5s 0.05s cubic-bezier(0.22, 1, 0.36, 1) both; }
  .divider { animation: cardIn 0.5s 0.08s cubic-bezier(0.22, 1, 0.36, 1) both; }
  .teams { animation: cardIn 0.5s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both; }
  .score-row { animation: cardIn 0.5s 0.12s cubic-bezier(0.22, 1, 0.36, 1) both; }
  .card-footer { animation: cardIn 0.5s 0.14s cubic-bezier(0.22, 1, 0.36, 1) both; }
</style>
</head>
<body>

<div class="match-card">
  <div class="card-header">
    <div class="league-badge">
      <div class="league-dot"></div>
      <span class="league-name">英超联赛</span>
    </div>
    <div style="text-align:right">
      <div class="match-time">21:00</div>
      <div class="date-label">04-17 周五</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="teams">
    <div class="team home">
      <div class="team-crest">🔴</div>
      <div class="team-name">曼联</div>
      <div class="team-name-en">MAN UTD</div>
    </div>

    <div class="vs-divider">
      <div class="vs-line"></div>
      <div class="vs-text">VS</div>
      <div class="vs-line"></div>
    </div>

    <div class="team away">
      <div class="team-crest">🔵</div>
      <div class="team-name">切尔西</div>
      <div class="team-name-en">CHELSEA</div>
    </div>
  </div>

  <div class="score-row">
    <span class="score">—</span>
    <span class="score-sep">:</span>
    <span class="score">—</span>
  </div>

  <div class="card-footer">
    <div class="prediction">
      <div class="pred-label">前瞻倾向</div>
      <div class="pred-tags">
        <span class="pred-tag hot">🔥 主场</span>
        <span class="pred-tag safe">稳单</span>
      </div>
    </div>
    <div class="odd-value">
      <div class="odd-label">胜平负</div>
      <div class="odd-number">1.75</div>
    </div>
  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 1280px;
    height: 500px;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .tag {
    background: #e94560;
    color: white;
    font-size: 18px;
    padding: 6px 20px;
    border-radius: 20px;
    margin-bottom: 20px;
    font-weight: bold;
    letter-spacing: 2px;
  }
  .title {
    color: #ffffff;
    font-size: 52px;
    font-weight: 900;
    text-align: center;
    line-height: 1.4;
    text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    max-width: 1100px;
  }
  .subtitle {
    color: #e94560;
    font-size: 26px;
    margin-top: 18px;
    font-weight: bold;
    letter-spacing: 4px;
  }
  .size-label {
    position: absolute;
    bottom: 12px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    color: #aaa;
    font-size: 14px;
    padding: 4px 12px;
    border-radius: 4px;
  }
</style>
</head>
<body>
  <div class="tag">⚽ 赛事前瞻</div>
  <div class="title">4 月 7 日重心赛事前瞻｜欧冠巅峰对决 + 澳超卡位战，3 场深度解析</div>
  <div class="subtitle">绿 茵 有 运</div>
  <div class="size-label">1280 × 500</div>
</body>
</html>

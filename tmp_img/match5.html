<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 1280px;
    height: 720px;
    margin: 0;
    background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 50%, #1a1a2e 100%);
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .title {
    color: #ffd700;
    font-size: 40px;
    font-weight: 900;
    letter-spacing: 4px;
    margin-bottom: 30px;
    text-align: center;
  }
  .stats {
    display: flex;
    align-items: center;
    gap: 40px;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,215,0,0.3);
    border-radius: 20px;
    padding: 30px 60px;
  }
  .team-left {
    text-align: center;
  }
  .team-logo {
    font-size: 80px;
    margin-bottom: 10px;
  }
  .team-name {
    color: white;
    font-size: 28px;
    font-weight: bold;
  }
  .record {
    text-align: center;
  }
  .record-num {
    font-size: 72px;
    font-weight: 900;
    color: #ffd700;
    line-height: 1;
  }
  .record-detail {
    color: rgba(255,255,255,0.6);
    font-size: 18px;
    margin-top: 8px;
  }
  .highlights {
    display: flex;
    gap: 20px;
    margin-top: 30px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .highlight-item {
    background: rgba(255,215,0,0.15);
    border: 1px solid #ffd700;
    border-radius: 30px;
    padding: 10px 24px;
    color: #ffd700;
    font-size: 18px;
    font-weight: bold;
  }
  .footer {
    position: absolute;
    bottom: 20px;
    color: rgba(255,255,255,0.3);
    font-size: 16px;
  }
</style>
</head>
<body>
  <div class="title">⚔️ 皇马 vs 拜仁 · 欧冠百年恩怨</div>
  <div class="stats">
    <div class="team-left">
      <div class="team-logo">👑</div>
      <div class="team-name" style="color:#ffd700;">皇家马德里</div>
    </div>
    <div class="record">
      <div class="record-num">10 - 2 - 2</div>
      <div class="record-detail">胜 · 平 · 负<br>近14场交锋</div>
    </div>
    <div class="team-left">
      <div class="team-logo">🔴</div>
      <div class="team-name" style="color:#e94560;">拜仁慕尼黑</div>
    </div>
  </div>
  <div class="highlights">
    <div class="highlight-item">🏆 近4次淘汰赛淘汰拜仁</div>
    <div class="highlight-item">👑 伯纳乌魔咒</div>
    <div class="highlight-item">⚔️ 心理优势明显</div>
  </div>
  <div class="footer">数据统计截止2026年4月 · 绿茵有运</div>
</body>
</html>

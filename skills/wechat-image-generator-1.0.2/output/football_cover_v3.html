<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1.0">
    <title>足球封面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px;
            height: 500px;
            overflow: hidden;
            font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            position: relative;
            background: #0f1923;
        }
        /* 深色渐变背景 */
        .bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, #0f1923 0%, #1a2f45 40%, #0d2818 100%);
        }
        /* 足球场透视网格 */
        .grid {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.04;
            background-image: 
                linear-gradient(rgba(255,255,255,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.3) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(500px) rotateX(30deg);
            transform-origin: center bottom;
        }
        /* 场地线条 */
        .field {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.05;
        }
        .field::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 75%;
            border: 2px solid #fff;
            border-bottom: none;
        }
        .field::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 25%;
            height: 15%;
            border: 2px solid #fff;
            border-bottom: none;
        }
        /* 光效 */
        .light-strip {
            position: absolute;
            top: 0;
            right: 0;
            width: 60%;
            height: 100%;
            background: linear-gradient(135deg, transparent 40%, rgba(59,130,246,0.08) 100%);
        }
        .light-radial {
            position: absolute;
            right: 10%;
            top: 50%;
            transform: translateY(-50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(16,185,129,0.06) 0%, transparent 70%);
        }
        /* 顶部时间条 */
        .time-bar {
            position: absolute;
            top: 30px;
            left: 60px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }
        .time-icon {
            width: 20px;
            height: 20px;
            background: rgba(239,68,68,0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 10px;
        }
        .time-text {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            letter-spacing: 1px;
        }
        /* 主内容区 */
        .main-content {
            position: absolute;
            left: 60px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            width: 650px;
        }
        /* 日期大字 */
        .date-large {
            font-size: 72px;
            font-weight: 800;
            color: #fff;
            line-height: 1;
            margin-bottom: 8px;
            letter-spacing: -2px;
        }
        .date-small {
            font-size: 20px;
            font-weight: 400;
            color: rgba(255,255,255,0.5);
            margin-bottom: 25px;
            letter-spacing: 3px;
        }
        /* 分隔线 */
        .divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #10b981);
            margin-bottom: 20px;
        }
        /* 标题 */
        .title-main {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            line-height: 1.4;
            margin-bottom: 12px;
        }
        .title-sub {
            font-size: 15px;
            color: rgba(255,255,255,0.55);
            line-height: 1.6;
            margin-bottom: 20px;
        }
        /* 联赛标签 */
        .leagues {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .league-tag {
            padding: 5px 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 3px;
            color: rgba(255,255,255,0.75);
            font-size: 12px;
            font-weight: 500;
        }
        /* 右侧装饰 */
        .right-area {
            position: absolute;
            right: 0;
            top: 0;
            width: 45%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        .ball-graphic {
            position: relative;
            width: 300px;
            height: 300px;
        }
        .ball-circle {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .ball-circle:nth-child(2) {
            width: 260px;
            height: 260px;
            border-color: rgba(255,255,255,0.05);
        }
        .ball-circle:nth-child(3) {
            width: 320px;
            height: 320px;
            border-color: rgba(255,255,255,0.03);
        }
        .ball-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .ball-number {
            font-size: 80px;
            font-weight: 800;
            color: rgba(255,255,255,0.06);
            line-height: 1;
        }
        .ball-label {
            font-size: 14px;
            color: rgba(255,255,255,0.15);
            letter-spacing: 4px;
            margin-top: 5px;
        }
        /* 底部栏 */
        .bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(180deg, transparent, rgba(0,0,0,0.4));
            display: flex;
            align-items: center;
            padding: 0 60px;
        }
        .bottom-text {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
        }
        .tagline {
            margin-left: auto;
            color: rgba(255,255,255,0.25);
            font-size: 12px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="grid"></div>
    <div class="field"></div>
    <div class="light-strip"></div>
    <div class="light-radial"></div>
    
    <div class="time-bar">
        <div class="time-icon">LIVE</div>
        <span class="time-text">2026.04.03 周五</span>
    </div>
    
    <div class="main-content">
        <div class="date-large">04.03</div>
        <div class="date-small">F R I D A Y</div>
        <div class="divider"></div>
        <div class="title-main">竞彩13场赛事全解析</div>
        <div class="title-sub">早场 · 夜场 · 深夜 全时段覆盖<br>冲超 · 争冠 · 保级 核心看点一文读懂</div>
        <div class="leagues">
            <span class="league-tag">澳超</span>
            <span class="league-tag">英冠</span>
            <span class="league-tag">沙特联</span>
            <span class="league-tag">法乙</span>
            <span class="league-tag">法甲</span>
            <span class="league-tag">西甲</span>
            <span class="league-tag">葡超</span>
            <span class="league-tag">荷乙</span>
        </div>
    </div>
    
    <div class="right-area">
        <div class="ball-graphic">
            <div class="ball-circle"></div>
            <div class="ball-circle"></div>
            <div class="ball-circle"></div>
            <div class="ball-text">
                <div class="ball-number">13</div>
                <div class="ball-label">场赛事</div>
            </div>
        </div>
    </div>
    
    <div class="bottom">
        <span class="bottom-text">慈云小白说球</span>
        <span class="tagline">理性观赛 · 享受足球</span>
    </div>
</body>
</html>

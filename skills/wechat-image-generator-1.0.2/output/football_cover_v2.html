<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1.0">
    <title>足球封面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px;
            height: 500px;
            overflow: hidden;
            font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            position: relative;
            background: #0a1628;
        }
        /* 背景 */
        .bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a1628 0%, #1a2d4a 50%, #0d2818 100%);
        }
        /* 足球场线条背景 */
        .field-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.06;
        }
        .field-overlay::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 75%;
            height: 80%;
            border: 2px solid #fff;
            border-bottom: none;
        }
        .field-overlay::after {
            content: '';
            position: absolute;
            top: 42%;
            left: 0;
            width: 100%;
            height: 1px;
            background: #fff;
        }
        .field-circle {
            position: absolute;
            top: 42%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%;
        }
        .field-dot {
            position: absolute;
            top: 42%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
        }
        /* 光效 */
        .glow-left {
            position: absolute;
            left: -100px;
            top: 50%;
            transform: translateY(-50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
        }
        .glow-right {
            position: absolute;
            right: -100px;
            bottom: 0;
            width: 500px;
            height: 300px;
            background: radial-gradient(circle, rgba(16,185,129,0.1) 0%, transparent 70%);
        }
        /* 顶部导航条 */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #10b981, #f59e0b);
        }
        /* 底部渐变 */
        .bottom-fade {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(180deg, transparent 0%, rgba(10,22,40,0.9) 100%);
        }
        /* 左侧内容区 */
        .content-left {
            position: absolute;
            left: 60px;
            top: 50%;
            transform: translateY(-50%);
            width: 700px;
            z-index: 10;
        }
        /* 日期标签 */
        .date-tag {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(239,68,68,0.9);
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        /* 主标题 */
        .main-title {
            color: #fff;
            font-size: 38px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 16px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        /* 副标题 */
        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        /* 赛事标签组 */
        .tags {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .tag {
            padding: 5px 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            color: rgba(255,255,255,0.8);
            font-size: 13px;
        }
        /* 右侧装饰 */
        .right-decor {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 5;
        }
        .big-number {
            font-size: 180px;
            font-weight: 800;
            color: rgba(255,255,255,0.03);
            line-height: 1;
            user-select: none;
        }
        .league-badges {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        .league-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
        }
        .league-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .league-dot.england { background: #3b82f6; box-shadow: 0 0 8px #3b82f6; }
        .league-dot.france { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .league-dot.australia { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
        .league-dot.saudi { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .league-dot.netherlands { background: #8b5cf6; box-shadow: 0 0 8px #8b5cf6; }
        .league-dot.portugal { background: #ec4899; box-shadow: 0 0 8px #ec4899; }
        .league-dot.spain { background: #f97316; box-shadow: 0 0 8px #f97316; }
        .league-text {
            color: rgba(255,255,255,0.75);
            font-size: 13px;
            font-weight: 500;
        }
        /* AI水印 */
        .ai-watermark {
            position: absolute;
            top: 450px;
            left: 1100px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            letter-spacing: 2px;
            z-index: 100;
        }
        /* 底部信息 */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            padding: 0 60px;
        }
        .footer-text {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="field-overlay"></div>
    <div class="field-circle"></div>
    <div class="field-dot"></div>
    <div class="glow-left"></div>
    <div class="glow-right"></div>
    <div class="top-bar"></div>
    <div class="bottom-fade"></div>
    
    <div class="content-left">
        <div class="date-tag">4月3日 周五 · 竞彩13场</div>
        <div class="main-title">4月3日竞彩13场赛事全解析<br>早场+夜场全覆盖</div>
        <div class="subtitle">澳超 · 英冠 · 沙特联 · 法乙 · 法甲 · 西甲 · 葡超 · 荷乙</div>
        <div class="tags">
            <span class="tag">冲超关键战</span>
            <span class="tag">保级生死战</span>
            <span class="tag">豪强VS弱旅</span>
            <span class="tag">深夜收尾</span>
        </div>
    </div>
    
    <div class="right-decor">
        <div class="big-number">13</div>
    </div>
    
    <div class="league-badges">
        <div class="league-badge">
            <div class="league-dot england"></div>
            <span class="league-text">英冠</span>
        </div>
        <div class="league-badge">
            <div class="league-dot france"></div>
            <span class="league-text">法甲</span>
        </div>
        <div class="league-badge">
            <div class="league-dot australia"></div>
            <span class="league-text">澳超</span>
        </div>
        <div class="league-badge">
            <div class="league-dot saudi"></div>
            <span class="league-text">沙特联</span>
        </div>
        <div class="league-badge">
            <div class="league-dot spain"></div>
            <span class="league-text">西甲</span>
        </div>
        <div class="league-badge">
            <div class="league-dot portugal"></div>
            <span class="league-text">葡超</span>
        </div>
        <div class="league-badge">
            <div class="league-dot netherlands"></div>
            <span class="league-text">荷乙</span>
        </div>
    </div>
    
    <div class="bottom-bar">
        <span class="footer-text">慈云小白说球 · 理性观赛 · 享受足球</span>
    </div>
    
    <div class="ai-watermark">AI生成</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1.0">
    <title>足球赛事封面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1280px;
            height: 500px;
            overflow: hidden;
            font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            position: relative;
        }
        /* 深色足球场背景 */
        .bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, 
                #0a1628 0%, 
                #162236 15%, 
                #1a3050 30%, 
                #1e4060 45%,
                #2a5a3a 65%, 
                #1a4d2e 80%, 
                #0d2818 100%);
        }
        /* 足球场草坪纹理 */
        .grass-texture {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65%;
            background: 
                repeating-linear-gradient(
                    90deg,
                    rgba(34,90,50,0.3) 0px,
                    rgba(34,90,50,0.3) 40px,
                    rgba(28,80,42,0.3) 40px,
                    rgba(28,80,42,0.3) 80px
                );
        }
        /* 球场线条 */
        .field-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.12;
        }
        .field-lines::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 85%;
            border: 2px solid rgba(255,255,255,0.5);
            border-bottom: none;
            border-radius: 4px 4px 0 0;
        }
        /* 中心圆 */
        .center-circle {
            position: absolute;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
        }
        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
        }
        /* 中线 */
        .halfway-line {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, 25%);
            width: 80%;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        /* 柔和灯光效果 */
        .light-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse 80% 50% at 30% 20%, rgba(255,255,200,0.05) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 70% 30%, rgba(255,255,200,0.04) 0%, transparent 50%);
        }
        /* 顶部光晕 */
        .top-glow {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 200px;
            background: radial-gradient(ellipse, rgba(60,120,180,0.15) 0%, transparent 70%);
        }
        /* 底部渐变 */
        .bottom-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(180deg, 
                transparent 0%, 
                rgba(10,22,40,0.6) 50%, 
                rgba(10,22,40,0.95) 100%);
        }
        /* 顶部渐变 */
        .top-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(180deg, 
                rgba(10,22,40,0.8) 0%, 
                transparent 100%);
        }
        /* 联赛标签 */
        .leagues {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 10;
        }
        .league-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .league-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .league-dot.england { background: #3b82f6; box-shadow: 0 0 8px #3b82f6; }
        .league-dot.france { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .league-dot.australia { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
        .league-name {
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        /* 日期标签 */
        .date-badge {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 50px;
            z-index: 10;
            padding: 8px 24px;
            background: rgba(239,68,68,0.85);
            border-radius: 20px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(239,68,68,0.3);
        }
        /* 底部装饰线 */
        .bottom-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, 
                #3b82f6 0%, 
                #10b981 25%, 
                #f59e0b 50%, 
                #ef4444 75%, 
                #8b5cf6 100%);
        }
        /* 足球装饰元素 */
        .football-decor {
            position: absolute;
            opacity: 0.08;
        }
        .football-decor::before {
            content: '⚽';
            font-size: 30px;
        }
        .decor-1 { top: 15%; left: 3%; }
        .decor-2 { top: 25%; right: 25%; }
        .decor-3 { bottom: 30%; left: 8%; }
        .decor-4 { bottom: 20%; right: 5%; }
        /* 微弱科技感线条 */
        .tech-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            background: 
                linear-gradient(90deg, transparent 49.5%, rgba(255,255,255,0.5) 49.5%, rgba(255,255,255,0.5) 50.5%, transparent 50.5%),
                linear-gradient(0deg, transparent 49.5%, rgba(255,255,255,0.5) 49.5%, rgba(255,255,255,0.5) 50.5%, transparent 50.5%);
        }
        /* AI生成水印 */
        .ai-watermark {
            position: absolute;
            top: 450px;
            left: 1100px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            letter-spacing: 2px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="grass-texture"></div>
    <div class="light-effect"></div>
    <div class="top-glow"></div>
    <div class="field-lines"></div>
    <div class="halfway-line"></div>
    <div class="center-circle"></div>
    <div class="center-dot"></div>
    <div class="tech-lines"></div>
    
    <div class="football-decor decor-1"></div>
    <div class="football-decor decor-2"></div>
    <div class="football-decor decor-3"></div>
    <div class="football-decor decor-4"></div>
    
    <div class="top-gradient"></div>
    <div class="bottom-gradient"></div>
    <div class="bottom-line"></div>
    
    <div class="leagues">
        <div class="league-item">
            <div class="league-dot england"></div>
            <span class="league-name">英冠</span>
        </div>
        <div class="league-item">
            <div class="league-dot france"></div>
            <span class="league-name">法甲</span>
        </div>
        <div class="league-item">
            <div class="league-dot australia"></div>
            <span class="league-name">澳超</span>
        </div>
    </div>
    
    <div class="date-badge">4月3日 周五 · 竞彩13场赛事</div>
    
    <div class="ai-watermark">AI生成</div>
</body>
</html>

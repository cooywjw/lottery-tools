<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1.0">
    <title>足球封面-水墨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px;
            height: 500px;
            overflow: hidden;
            font-family: "PingFang SC", "Noto Serif SC", "STSong", "SimSun", serif;
            position: relative;
            background: #1a1a1a;
        }
        /* 水墨渐变背景 */
        .ink-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse 120% 80% at 20% 80%, rgba(60,60,60,0.4) 0%, transparent 50%),
                radial-gradient(ellipse 100% 60% at 80% 20%, rgba(80,80,80,0.3) 0%, transparent 40%),
                radial-gradient(ellipse 80% 50% at 50% 100%, rgba(40,40,40,0.5) 0%, transparent 50%),
                linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 40%, #0d0d0d 100%);
        }
        /* 山水远景 */
        .mountains {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            opacity: 0.15;
        }
        .mountain-layer {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
        }
        .mountain-1 {
            background: radial-gradient(ellipse 60% 40% at 30% 100%, rgba(80,80,80,0.8) 0%, transparent 70%);
        }
        .mountain-2 {
            background: radial-gradient(ellipse 50% 35% at 70% 100%, rgba(100,100,100,0.6) 0%, transparent 60%);
        }
        .mountain-3 {
            background: radial-gradient(ellipse 40% 25% at 50% 100%, rgba(120,120,120,0.5) 0%, transparent 60%);
        }
        /* 足球场轮廓 */
        .field-outline {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 50%;
            border: 1px solid rgba(255,255,255,0.06);
            border-bottom: none;
        }
        .field-outline::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 100%;
            border: 1px solid rgba(255,255,255,0.04);
            border-bottom: none;
        }
        .field-outline::after {
            content: '';
            position: absolute;
            top: 40%;
            left: 0;
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.03);
        }
        /* 中心圆 */
        .center-circle {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        /* 水墨笔触装饰 */
        .ink-stroke {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            height: 1px;
        }
        .stroke-1 { top: 30%; width: 40%; left: 5%; transform: rotate(-5deg); }
        .stroke-2 { top: 45%; width: 30%; right: 10%; transform: rotate(3deg); }
        .stroke-3 { bottom: 40%; width: 25%; left: 15%; transform: rotate(-2deg); }
        /* 光效 */
        .light-mist {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse 50% 30% at 30% 70%, rgba(255,255,255,0.02) 0%, transparent 50%),
                radial-gradient(ellipse 40% 25% at 70% 30%, rgba(255,255,255,0.015) 0%, transparent 50%);
        }
        /* 墨点装饰 */
        .ink-dot {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }
        .ink-dot:nth-child(1) { top: 20%; left: 10%; }
        .ink-dot:nth-child(2) { top: 35%; right: 15%; width: 2px; height: 2px; }
        .ink-dot:nth-child(3) { bottom: 30%; left: 20%; }
        .ink-dot:nth-child(4) { top: 50%; right: 25%; width: 4px; height: 4px; }
        .ink-dot:nth-child(5) { bottom: 25%; right: 10%; }
        /* 日期区域 */
        .date-area {
            position: absolute;
            left: 60px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }
        .date-main {
            font-size: 64px;
            font-weight: 400;
            color: rgba(255,255,255,0.9);
            line-height: 1;
            letter-spacing: 4px;
            margin-bottom: 8px;
            text-shadow: 0 0 30px rgba(255,255,255,0.1);
        }
        .date-week {
            font-size: 16px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 8px;
            margin-bottom: 30px;
        }
        /* 分隔线-毛笔风格 */
        .brush-line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
            margin-bottom: 20px;
            position: relative;
        }
        .brush-line::after {
            content: '';
            position: absolute;
            right: 0;
            top: -1px;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
        }
        /* 标题 */
        .title-cn {
            font-size: 26px;
            font-weight: 400;
            color: rgba(255,255,255,0.85);
            line-height: 1.5;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .title-sub {
            font-size: 13px;
            color: rgba(255,255,255,0.35);
            letter-spacing: 3px;
            margin-bottom: 25px;
        }
        /* 联赛标签-简约 */
        .tags {
            display: flex;
            gap: 15px;
        }
        .tag {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        /* 右侧装饰 */
        .right-decor {
            position: absolute;
            right: 80px;
            top: 50%;
            transform: translateY(-50%);
            text-align: right;
            z-index: 10;
        }
        .match-count {
            font-size: 120px;
            font-weight: 300;
            color: rgba(255,255,255,0.04);
            line-height: 1;
            letter-spacing: -5px;
        }
        .match-label {
            font-size: 14px;
            color: rgba(255,255,255,0.15);
            letter-spacing: 6px;
            margin-top: -20px;
        }
        /* 底部信息 */
        .footer {
            position: absolute;
            bottom: 25px;
            left: 60px;
            right: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .footer-text {
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            letter-spacing: 4px;
        }
        /* 墨迹晕染边框 */
        .border-ink {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255,255,255,0.03);
            pointer-events: none;
        }
        .border-ink::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid rgba(255,255,255,0.02);
        }
    </style>
</head>
<body>
    <div class="ink-bg"></div>
    
    <div class="mountains">
        <div class="mountain-layer mountain-1"></div>
        <div class="mountain-layer mountain-2"></div>
        <div class="mountain-layer mountain-3"></div>
    </div>
    
    <div class="field-outline"></div>
    <div class="center-circle"></div>
    
    <div class="ink-stroke stroke-1"></div>
    <div class="ink-stroke stroke-2"></div>
    <div class="ink-stroke stroke-3"></div>
    
    <div class="light-mist"></div>
    
    <div class="ink-dot"></div>
    <div class="ink-dot"></div>
    <div class="ink-dot"></div>
    <div class="ink-dot"></div>
    <div class="ink-dot"></div>
    
    <div class="border-ink"></div>
    
    <div class="date-area">
        <div class="date-main">04.03</div>
        <div class="date-week">F R I D A Y</div>
        <div class="brush-line"></div>
        <div class="title-cn">竞彩十三场赛事解析</div>
        <div class="title-sub">早场 · 夜场 · 深夜 全域覆盖</div>
        <div class="tags">
            <span class="tag">澳超</span>
            <span class="tag">英冠</span>
            <span class="tag">法甲</span>
            <span class="tag">葡超</span>
            <span class="tag">西甲</span>
        </div>
    </div>
    
    <div class="right-decor">
        <div class="match-count">13</div>
        <div class="match-label">场赛事</div>
    </div>
    
    <div class="footer">
        <span class="footer-text">慈云小白说球</span>
        <span class="footer-text">理性观赛 · 享受足球</span>
    </div>
</body>
</html>

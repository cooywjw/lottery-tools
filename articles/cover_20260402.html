<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 1080px;
    height: 675px;
    margin: 0;
    overflow: hidden;
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
    background: linear-gradient(135deg, #1a3a1a 0%, #0d2610 50%, #1a1a2e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  /* Pitch lines decoration */
  .pitch-line {
    position: absolute;
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .pitch-circle {
    width: 400px;
    height: 400px;
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    position: absolute;
  }
  .pitch-center {
    width: 120px;
    height: 120px;
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 50%;
    position: absolute;
  }
  /* Top badge */
  .date-badge {
    background: linear-gradient(135deg, #ff6b35, #ee4b2b);
    color: white;
    font-size: 22px;
    font-weight: 600;
    padding: 10px 30px;
    border-radius: 30px;
    margin-bottom: 25px;
    letter-spacing: 2px;
    box-shadow: 0 4px 15px rgba(255,107,53,0.4);
  }
  /* Main title */
  .main-title {
    color: #ffffff;
    font-size: 72px;
    font-weight: 800;
    text-align: center;
    line-height: 1.2;
    text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    margin-bottom: 20px;
    letter-spacing: 4px;
  }
  /* Divider */
  .divider {
    width: 120px;
    height: 4px;
    background: linear-gradient(90deg, #ff6b35, #ffcc02);
    border-radius: 2px;
    margin-bottom: 20px;
  }
  /* Subtitle */
  .subtitle {
    color: rgba(255,255,255,0.9);
    font-size: 32px;
    font-weight: 400;
    text-align: center;
    letter-spacing: 8px;
  }
  /* League tags */
  .tags {
    display: flex;
    gap: 20px;
    margin-top: 35px;
  }
  .tag {
    padding: 10px 25px;
    border-radius: 25px;
    font-size: 20px;
    font-weight: 600;
    color: white;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
  }
  /* Corner decoration */
  .corner-tl {
    position: absolute;
    top: 30px;
    left: 30px;
    width: 60px;
    height: 60px;
    border-top: 3px solid rgba(255,204,2,0.6);
    border-left: 3px solid rgba(255,204,2,0.6);
  }
  .corner-br {
    position: absolute;
    bottom: 30px;
    right: 30px;
    width: 60px;
    height: 60px;
    border-bottom: 3px solid rgba(255,204,2,0.6);
    border-right: 3px solid rgba(255,204,2,0.6);
  }
  /* Bottom info */
  .bottom-text {
    position: absolute;
    bottom: 35px;
    color: rgba(255,255,255,0.5);
    font-size: 16px;
    letter-spacing: 3px;
  }
</style>
</head>
<body>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>
  <div class="pitch-circle" style="top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.5;"></div>
  <div class="pitch-center" style="top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>

  <div class="date-badge">4月2日 周四</div>
  <div class="main-title">周四赛事早知道</div>
  <div class="divider"></div>
  <div class="subtitle">澳超 · 英甲 · 女足青年赛</div>
  <div class="tags">
    <span class="tag">A-League</span>
    <span class="tag">League One</span>
    <span class="tag">Youth Tournament</span>
  </div>
  <div class="bottom-text">慈云小白说球</div>
</body>
</html>
